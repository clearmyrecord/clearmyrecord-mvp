<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Details - ClearMyRecord</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    :root {
      --rd-bg: #eef2f8;
      --rd-surface: #ffffff;
      --rd-surface-soft: #f8faff;
      --rd-text: #233d70;
      --rd-muted: #667796;
      --rd-border: #dbe4f1;
      --rd-border-strong: #cfd9e8;
      --rd-primary: #76a9f7;
      --rd-primary-dark: #5d95ec;
      --rd-primary-light: #dce9fd;
      --rd-shadow: 0 10px 30px rgba(61, 92, 152, 0.08);
      --rd-radius: 18px;
      --rd-radius-lg: 24px;
      --rd-container: 980px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: var(--rd-bg);
      color: var(--rd-text);
    }

    .rd-page {
      padding: 28px 16px 72px;
    }

    .rd-shell {
      width: min(var(--rd-container), 100%);
      margin: 0 auto;
    }

    .rd-card {
      background: var(--rd-surface);
      border: 1px solid var(--rd-border);
      border-radius: 32px;
      box-shadow: var(--rd-shadow);
      padding: 34px 32px 28px;
    }

    .rd-header {
      margin-bottom: 26px;
    }

    .rd-title {
      margin: 0 0 10px;
      font-size: clamp(36px, 5vw, 64px);
      line-height: 0.98;
      letter-spacing: -1.5px;
      font-weight: 800;
      color: var(--rd-text);
    }

    .rd-subtitle {
      margin: 0;
      max-width: 760px;
      font-size: clamp(18px, 2.2vw, 28px);
      line-height: 1.35;
      color: var(--rd-muted);
    }

    .rd-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      margin: 8px 0 24px;
      flex-wrap: wrap;
    }

    .rd-btn {
      appearance: none;
      border: 0;
      border-radius: 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      white-space: nowrap;
    }

    .rd-btn:hover {
      transform: translateY(-1px);
    }

    .rd-btn:active {
      transform: translateY(0);
    }

    .rd-btn-secondary {
      background: #e7ebf1;
      color: #3f5b8f;
      padding: 18px 28px;
      min-height: 64px;
      box-shadow: none;
    }

    .rd-btn-primary {
      background: linear-gradient(180deg, var(--rd-primary) 0%, var(--rd-primary-dark) 100%);
      color: #fff;
      padding: 18px 34px;
      min-height: 64px;
      box-shadow: 0 10px 22px rgba(93, 149, 236, 0.2);
    }

    .rd-btn-small {
      min-height: 50px;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 15px;
    }

    .rd-offenses {
      display: grid;
      gap: 18px;
      margin-bottom: 26px;
    }

    .rd-offense {
      background: var(--rd-surface-soft);
      border: 1px solid var(--rd-border);
      border-radius: 22px;
      padding: 22px;
    }

    .rd-offense-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    .rd-offense-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
      color: var(--rd-text);
    }

    .rd-remove-btn {
      background: #eef2f8;
      color: #516a95;
      border: 1px solid var(--rd-border);
    }

    .rd-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 16px;
    }

    .rd-field {
      position: relative;
    }

    .rd-field-full {
      grid-column: 1 / -1;
    }

    .rd-label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.3;
      font-weight: 700;
      color: #48608b;
    }

    .rd-input,
    .rd-textarea {
      width: 100%;
      border: 1px solid var(--rd-border-strong);
      border-radius: 14px;
      background: #fff;
      color: var(--rd-text);
      font: inherit;
      font-size: 15px;
      line-height: 1.4;
      padding: 14px 14px;
      outline: none;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .rd-textarea {
      min-height: 108px;
      resize: vertical;
    }

    .rd-input:focus,
    .rd-textarea:focus {
      border-color: var(--rd-primary-dark);
      box-shadow: 0 0 0 4px rgba(118, 169, 247, 0.16);
    }

    .rd-input::placeholder,
    .rd-textarea::placeholder {
      color: #90a0bc;
    }

    .rd-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 20;
      display: none;
      background: #fff;
      border: 1px solid var(--rd-border);
      border-radius: 14px;
      box-shadow: 0 14px 28px rgba(42, 63, 109, 0.12);
      max-height: 240px;
      overflow-y: auto;
    }

    .rd-suggestions.is-open {
      display: block;
    }

    .rd-suggestion {
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.35;
      color: var(--rd-text);
      cursor: pointer;
      border-bottom: 1px solid #edf2f8;
    }

    .rd-suggestion:last-child {
      border-bottom: 0;
    }

    .rd-suggestion:hover,
    .rd-suggestion.is-active {
      background: #f3f7fe;
    }

    .rd-helper {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.35;
      color: #8797b4;
    }

    .rd-empty {
      background: #f7f9fd;
      border: 1px dashed var(--rd-border);
      border-radius: 18px;
      padding: 18px;
      color: var(--rd-muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .rd-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .rd-actions-left,
    .rd-actions-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .rd-status {
      font-size: 14px;
      line-height: 1.4;
      color: var(--rd-muted);
    }

    @media (max-width: 860px) {
      .rd-card {
        padding: 26px 20px 22px;
        border-radius: 26px;
      }

      .rd-grid {
        grid-template-columns: 1fr;
      }

      .rd-offense {
        padding: 18px;
      }
    }

    @media (max-width: 560px) {
      .rd-page {
        padding: 18px 12px 44px;
      }

      .rd-card {
        padding: 22px 16px 20px;
        border-radius: 22px;
      }

      .rd-toolbar {
        margin-bottom: 18px;
      }

      .rd-btn-secondary,
      .rd-btn-primary {
        min-height: 58px;
        padding: 16px 22px;
      }

      .rd-actions {
        align-items: stretch;
      }

      .rd-actions-left,
      .rd-actions-right {
        width: 100%;
      }

      .rd-actions-right .rd-btn,
      .rd-actions-left .rd-btn {
        flex: 1 1 auto;
      }

      .rd-offense-top {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="rd-page">
    <div class="rd-shell">
      <section class="rd-card">
        <header class="rd-header">
          <h1 class="rd-title">Enter Your Record Details</h1>
          <p class="rd-subtitle">
            Add each offense so we can determine eligibility and generate your forms.
          </p>
        </header>

        <div class="rd-toolbar">
          <button type="button" class="rd-btn rd-btn-secondary" id="addOffenseBtn">
            + Add Offense
          </button>
        </div>

        <div id="offenseList" class="rd-offenses"></div>

        <div id="emptyState" class="rd-empty" hidden>
          No offenses added yet. Tap <strong>+ Add Offense</strong> to begin.
        </div>

        <div class="rd-actions">
          <div class="rd-actions-left">
            <button type="button" class="rd-btn rd-btn-secondary" id="backBtn">Back</button>
          </div>

          <div class="rd-actions-right">
            <div class="rd-status" id="recordStatus">1 offense added</div>
            <button type="button" class="rd-btn rd-btn-primary" id="continueBtn">Continue</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="js/charges.js"></script>
  <script src="js/record-details.js"></script>
</body>
</html>
