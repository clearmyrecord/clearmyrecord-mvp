<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Details | RecordPathAI</title>
  <style>
    :root {
      --bg: #eef2f8;
      --surface: #ffffff;
      --surface-soft: #f8fbff;
      --text: #233d70;
      --muted: #667796;
      --line: #dbe4f1;
      --shadow: 0 10px 30px rgba(78, 110, 167, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .rd-shell {
      width: min(1100px, 92%);
      margin: 28px auto 60px;
    }

    .rd-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 36px;
    }

    .rd-header h1 {
      margin: 0 0 10px;
      font-size: clamp(38px, 5vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #26457a;
    }

    .rd-header p {
      margin: 0 0 26px;
      color: #60708d;
      font-size: 17px;
      line-height: 1.6;
    }

    .rd-toolbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .rd-status {
      color: #6a7894;
      font-size: 14px;
    }

    .rd-btn {
      min-height: 58px;
      padding: 16px 24px;
      border-radius: 16px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    .rd-btn-primary {
      background: linear-gradient(180deg, #86b7fb 0%, #5d91e6 100%);
      color: #fff;
    }

    .rd-btn-secondary {
      background: #fff;
      border: 1px solid #d5e0ef;
      color: #3c557d;
    }

    .rd-btn-soft {
      background: #eaf1fb;
      color: #406199;
    }

    .rd-list {
      display: grid;
      gap: 18px;
    }

    .rd-offense {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
    }

    .rd-offense-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      align-items: center;
    }

    .rd-offense-head h2 {
      margin: 0;
      font-size: 22px;
      color: #26457a;
    }

    .rd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .rd-field {
      position: relative;
    }

    .rd-field-full {
      grid-column: 1 / -1;
    }

    .rd-field label {
      display: block;
      margin-bottom: 9px;
      color: #3f5a87;
      font-size: 15px;
      font-weight: 700;
    }

    .rd-field input,
    .rd-field textarea,
    .rd-field select {
      width: 100%;
      min-height: 58px;
      padding: 16px 18px;
      border: 1px solid #d5e0ef;
      border-radius: 16px;
      background: #fff;
      color: #243755;
      font-size: 16px;
      outline: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    .rd-field textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.5;
    }

    .rd-helper {
      margin-top: 7px;
      color: #7a89a3;
      font-size: 13px;
      line-height: 1.5;
    }

    .rd-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #d5e0ef;
      border-radius: 14px;
      box-shadow: 0 12px 26px rgba(42, 63, 109, 0.12);
      overflow: hidden;
      z-index: 30;
      display: none;
      max-height: 240px;
      overflow-y: auto;
    }

    .rd-suggestion {
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
      border-bottom: 1px solid #edf2f8;
    }

    .rd-suggestion:last-child {
      border-bottom: none;
    }

    .rd-suggestion:hover,
    .rd-suggestion.active {
      background: #f3f7fe;
    }

    .court-packet-status a {
      color: #1f4ca5;
      text-decoration: underline;
    }

    .rd-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    .rd-actions .rd-btn-primary {
      flex: 1 1 220px;
    }

    .rd-note {
      margin-top: 18px;
      color: #6a7894;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .rd-card {
        padding: 24px 18px;
      }

      .rd-grid {
        grid-template-columns: 1fr;
      }

      .rd-toolbar,
      .rd-actions,
      .rd-offense-head {
        flex-direction: column;
        align-items: stretch;
      }

      .rd-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="rd-shell">
      <div class="rd-card">
        <div class="rd-header">
          <h1>Enter Your Record Details</h1>
          <p>
            Add each offense, select the court and state, and RecordPathAI will look for the likely official packet for that court.
          </p>
        </div>

        <div class="rd-toolbar">
          <button type="button" class="rd-btn rd-btn-soft" id="addOffenseBtn">+ Add Offense</button>
          <div class="rd-status" id="recordStatus">1 offense added</div>
        </div>

        <div class="rd-list" id="offenseList"></div>

        <div class="rd-actions">
          <a href="eligibility.html" class="rd-btn rd-btn-secondary">Back</a>
          <button type="button" id="continueBtn" class="rd-btn rd-btn-primary">Continue</button>
        </div>

        <p class="rd-note">
          Nationwide packet discovery is enabled. Exact PDF auto-fill is currently mapped for Wood County Common Pleas only.
        </p>
      </div>
    </section>
  </main>

  <script src="js/charges.js"></script>
  <script src="js/record-details.js"></script>
</body>
</html>
