<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Details - ClearMyRecord</title>
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .page {
      padding: 40px 0 80px;
    }

    .form-card {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 25px;
    }

    .offense-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      background: #fafbff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .field {
      position: relative;
    }

    .field label {
      font-size: 13px;
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .suggestions div {
      padding: 10px;
      cursor: pointer;
    }

    .suggestions div:hover {
      background: #f3f4f6;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-primary {
      background: #6f9eea;
      color: #fff;
    }

    .btn-secondary {
      background: #e5e7eb;
    }

    .add-btn {
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="form-card">
      <div class="title">Enter Your Record Details</div>
      <div class="subtitle">
        Add each offense so we can determine eligibility and generate your forms.
      </div>

      <div id="offenses"></div>

      <button class="btn btn-secondary add-btn" onclick="addOffense()">
        + Add Offense
      </button>

      <div class="actions">
        <button class="btn btn-secondary">Back</button>
        <button class="btn btn-primary">Continue</button>
      </div>
    </div>
  </div>

  <script src="js/charges.js"></script>
  <script src="js/record-details.js"></script>
</body>
</html>
