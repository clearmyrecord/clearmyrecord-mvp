<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Details - ClearMyRecord</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo">ClearMyRecord</div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="how-it-works.html">How It Works</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="form-section">
    <div class="form-card">

      <h1>Record Details</h1>
      <p class="section-intro">
        Enter your case details. Start typing — we’ll suggest the correct options.
      </p>

      <form id="recordForm" class="form-grid">

        <!-- Charge -->
        <div class="form-field">
          <label>Charge Name</label>
          <input type="text" id="chargeName" list="chargeList" placeholder="Start typing..." />
          <datalist id="chargeList"></datalist>
        </div>

        <!-- Level -->
        <div class="form-field">
          <label>Charge Level</label>
          <input type="text" id="chargeLevel" list="levelList" placeholder="Start typing..." />
          <datalist id="levelList"></datalist>
        </div>

        <!-- Status -->
        <div class="form-field">
          <label>Case Status</label>
          <input type="text" id="caseStatus" list="statusList" placeholder="Start typing..." />
          <datalist id="statusList"></datalist>
        </div>

        <!-- Disposition -->
        <div class="form-field">
          <label>Disposition</label>
          <input type="text" id="disposition" list="dispositionList" placeholder="Start typing..." />
          <datalist id="dispositionList"></datalist>
        </div>

        <!-- Plea -->
        <div class="form-field">
          <label>Plea</label>
          <input type="text" id="plea" list="pleaList" placeholder="Start typing..." />
          <datalist id="pleaList"></datalist>
        </div>

        <!-- Sentence -->
        <div class="form-field">
          <label>Sentence Type</label>
          <input type="text" id="sentenceType" list="sentenceList" placeholder="Start typing..." />
          <datalist id="sentenceList"></datalist>
        </div>

        <!-- Court -->
        <div class="form-field">
          <label>Court Type</label>
          <input type="text" id="courtType" list="courtList" placeholder="Start typing..." />
          <datalist id="courtList"></datalist>
        </div>

        <!-- State -->
        <div class="form-field">
          <label>State</label>
          <input type="text" id="state" list="stateList" placeholder="Start typing..." />
          <datalist id="stateList"></datalist>
        </div>

        <!-- County -->
        <div class="form-field">
          <label>County</label>
          <input type="text" id="county" list="countyList" placeholder="Start typing..." />
          <datalist id="countyList"></datalist>
        </div>

        <!-- Agency -->
        <div class="form-field">
          <label>Arresting Agency</label>
          <input type="text" id="agency" list="agencyList" placeholder="Start typing..." />
          <datalist id="agencyList"></datalist>
        </div>

        <!-- Dates -->
        <div class="form-field">
          <label>Filing Date</label>
          <input type="date" id="filingDate" />
        </div>

        <div class="form-field">
          <label>Disposition Date</label>
          <input type="date" id="dispositionDate" />
        </div>

        <div class="form-field">
          <label>Sentence Completion</label>
          <input type="date" id="completionDate" />
        </div>

        <!-- Notes -->
        <div class="form-field full">
          <label>Notes</label>
          <textarea id="notes" rows="4"></textarea>
        </div>

        <!-- Buttons -->
        <div class="form-actions full">
          <button type="button" class="btn-secondary" id="addCase">+ Add Another Case</button>
          <button type="submit" class="btn-primary">Continue</button>
        </div>

      </form>

    </div>
  </section>

</main>

<script src="js/charges.js"></script>
<script src="js/record-details.js"></script>

</body>
</html>
