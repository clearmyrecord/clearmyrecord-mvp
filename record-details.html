<!DOCTYPE html>
<html>
<head>
<title>Record Details</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="page">

<div class="progress">Step 2 of 3</div>

<div class="card">

<h2>Record Details</h2>

<label>Felony Level</label>

<select id="felony">
<option value="3">3rd Degree</option>
<option value="4">4th Degree</option>
<option value="5">5th Degree</option>
</select>

<label>Years Since Conviction</label>

<input type="number" id="years">

<label>Have all fines been paid?</label>

<select id="fines">
<option value="yes">Yes</option>
<option value="no">No</option>
</select>

<button class="primary-btn" onclick="checkEligibility()">
Check Eligibility
</button>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
