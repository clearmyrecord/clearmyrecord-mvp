<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Record Details - ClearMyRecord</title>

  <script src="js/sealing-rules.js"></script>
  <script src="js/eligibility.js"></script>
  <script src="js/app.js" defer></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f7fc;
      color: #1b2430;
      padding: 24px 16px;
    }

    .card {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin-top: 0;
      color: #123d8f;
    }

    .subtext {
      color: #5b6b7f;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .offense {
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      background: #fbfdff;
    }

    .offense-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .offense-title {
      font-size: 18px;
      font-weight: 700;
      color: #123d8f;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .form-field {
      display: block;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #cfd8e3;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: none;
      background: #123d8f;
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #e8eef7;
      color: #1b2430;
    }

    #result {
      margin-top: 22px;
      padding: 18px;
      border-radius: 12px;
      background: #eef4ff;
      border: 1px solid #d5e2fb;
      line-height: 1.6;
    }

    .result-bad {
      background: #fff3f3 !important;
      border-color: #f0cccc !important;
    }

    .result-good {
      background: #eefaf1 !important;
      border-color: #c7ead0 !important;
    }

    .result-neutral {
      background: #fffbea !important;
      border-color: #f2e2a7 !important;
    }

    .offense-summary {
      margin-top: 12px;
      padding-left: 18px;
    }

    .offense-summary li {
      margin-bottom: 6px;
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Record Details</h1>
    <p class="subtext">
      Add every offense that appears on the user’s record. Each charge can have a different outcome, level, and waiting period.
    </p>

    <div class="actions">
      <button type="button" onclick="addOffense()">+ Add Offense</button>
    </div>

    <div id="offenses"></div>

    <div class="actions">
      <button type="button" onclick="checkAllEligibility()">Check Eligibility</button>
    </div>

    <div id="result" class="result-neutral">
      Add at least one offense, then click Check Eligibility.
    </div>
  </div>
</body>
</html>
