<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Field Inspector</title>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
      margin: 0;
      background: #f7f9fc;
      color: #1b2430;
    }

    .card {
      max-width: 900px;
      background: #fff;
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #123d8f;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .status {
      margin: 12px 0;
      font-size: 14px;
      color: #44556b;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f3f6fb;
      border: 1px solid #d9e2ec;
      border-radius: 10px;
      padding: 16px;
      min-height: 180px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PDF Field Inspector</h1>

    <div class="row">
      <input type="file" id="pdfUpload" accept="application/pdf" />
      <button type="button" id="inspectBtn">Inspect Fields</button>
    </div>

    <div class="status" id="status">Choose a PDF, then click Inspect Fields.</div>
    <pre id="output"></pre>
  </div>

  <script>
    document.getElementById("inspectBtn").addEventListener("click", inspectPdfFields);

    async function inspectPdfFields() {
      const fileInput = document.getElementById("pdfUpload");
      const output = document.getElementById("output");
      const status = document.getElementById("status");

      output.textContent = "";
      status.textContent = "Working...";

      try {
        if (!window.PDFLib) {
          throw new Error("pdf-lib did not load.");
        }

        if (!fileInput.files || !fileInput.files.length) {
          status.textContent = "No file selected.";
          output.textContent = "Choose a PDF first.";
          return;
        }

        const file = fileInput.files[0];
        const bytes = await file.arrayBuffer();

        const pdfDoc = await PDFLib.PDFDocument.load(bytes);
        let form;

        try {
          form = pdfDoc.getForm();
        } catch (err) {
          status.textContent = "No fillable form detected.";
          output.textContent =
            "This PDF does not appear to contain a standard AcroForm.\n\n" +
            "That usually means it is a flat PDF, and you’ll need coordinate-based text overlay instead.";
          return;
        }

        const fields = form.getFields();

        if (!fields.length) {
          status.textContent = "No fields found.";
          output.textContent =
            "This PDF loaded successfully, but no fillable fields were found.\n\n" +
            "That usually means it is not a fillable form.";
          return;
        }

        const names = fields.map((field, index) => {
          return `${index + 1}. ${field.constructor.name}: ${field.getName()}`;
        });

        status.textContent = `Found ${fields.length} field(s).`;
        output.textContent = names.join("\n");
      } catch (error) {
        status.textContent = "Error inspecting PDF.";
        output.textContent = `Error: ${error.message}`;
        console.error(error);
      }
    }
  </script>
</body>
</html>
