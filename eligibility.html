<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Eligibility | RecordPathAI</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .eligibility-shell {
      width: min(760px, 92%);
      margin: 28px auto 60px;
    }

    .eligibility-card {
      background: #ffffff;
      border: 1px solid #e2e9f5;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(78, 110, 167, 0.12);
      padding: 36px;
    }

    .eligibility-header {
      margin-bottom: 28px;
    }

    .eligibility-header h1 {
      margin: 0 0 10px;
      color: #26457a;
      font-size: clamp(38px, 5vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .eligibility-header p {
      margin: 0;
      color: #60708d;
      font-size: 17px;
      line-height: 1.6;
    }

    .eligibility-section {
      margin-top: 30px;
    }

    .eligibility-section:first-of-type {
      margin-top: 0;
    }

    .eligibility-section-title {
      margin: 0 0 18px;
      color: #3b5685;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .eligibility-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 18px;
    }

    .eligibility-field {
      display: block;
    }

    .eligibility-field-full {
      grid-column: 1 / -1;
    }

    .eligibility-field label {
      display: block;
      margin-bottom: 9px;
      color: #3f5a87;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.2;
    }

    .eligibility-field input {
      width: 100%;
      min-height: 58px;
      padding: 16px 18px;
      border: 1px solid #d5e0ef;
      border-radius: 16px;
      background: #ffffff;
      color: #243755;
      font-size: 17px;
      line-height: 1.2;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }

    .eligibility-field input:focus {
      border-color: #7eaef3;
      box-shadow: 0 0 0 4px rgba(126, 174, 243, 0.15);
    }

    .eligibility-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 32px;
    }

    .eligibility-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .eligibility-btn-primary {
      background: linear-gradient(180deg, #86b7fb 0%, #5d91e6 100%);
      color: #ffffff;
      box-shadow: 0 10px 30px rgba(78, 110, 167, 0.12);
      flex: 1 1 220px;
    }

    .eligibility-btn-secondary {
      background: #ffffff;
      color: #3c557d;
      border: 1px solid #d5e0ef;
      flex: 0 0 auto;
    }

    .eligibility-note {
      margin-top: 18px;
      color: #6a7894;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .eligibility-shell {
        width: min(92%, 760px);
        margin-top: 18px;
      }

      .eligibility-card {
        padding: 26px 20px 24px;
        border-radius: 20px;
      }

      .eligibility-header {
        margin-bottom: 22px;
      }

      .eligibility-header h1 {
        font-size: 34px;
        line-height: 1.04;
      }

      .eligibility-header p {
        font-size: 15px;
      }

      .eligibility-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .eligibility-field input {
        min-height: 56px;
        font-size: 16px;
      }

      .eligibility-actions {
        flex-direction: column;
      }

      .eligibility-btn {
        width: 100%;
      }
    }
  </style>
</head>

      <nav class="main-nav">
