<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RecordPathAI – Start</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo">RecordPathAI</div>
  </div>
</header>

<main class="container">
  <div class="card">

    <h1>Start Your Record Clearance</h1>
    <p>Enter your basic information to begin.</p>

    <form id="startForm" class="form-grid">

      <div class="form-field">
        <label>Full Name</label>
        <input type="text" id="fullName" required />
      </div>

      <div class="form-field">
        <label>Date of Birth</label>
        <input type="date" id="dob" required />
      </div>

      <div class="form-field">
        <label>State of Case</label>
        <input type="text" id="state" placeholder="Start typing..." required />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Continue</button>
      </div>

    </form>

  </div>
</main>

<script>
document.getElementById("startForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("fullName").value,
    dob: document.getElementById("dob").value,
    state: document.getElementById("state").value,
    charges: []
  };

  localStorage.setItem("recordPathData", JSON.stringify(data));
  window.location.href = "record-details.html";
});
</script>

</body>
</html>
