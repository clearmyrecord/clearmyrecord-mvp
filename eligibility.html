<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Eligibility | ClearMyRecord</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container nav-wrap">
      <a href="index.html" class="brand">
        <span class="brand-icon">📄</span>
        <span class="brand-text">ClearMyRecord</span>
      </a>

      <nav class="main-nav">
        <a href="how-it-works.html">How It Works</a>
        <a href="eligibility.html">Eligibility</a>
      </nav>
    </div>
  </header>

  <main class="application-page">
    <section class="application-header">
      <div class="section-inner">
        <h1>Check Your Eligibility</h1>
        <p>Enter your basic information to begin your application.</p>
      </div>
    </section>

    <section class="application-section">
      <div class="form-card">

        <div class="form-grid">
          <div class="form-field">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="First name" />
          </div>

          <div class="form-field">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Last name" />
          </div>

          <div class="form-field">
            <label>Email</label>
            <input type="email" id="email" placeholder="Email address" />
          </div>

          <div class="form-field">
            <label>Phone</label>
            <input type="text" id="phone" placeholder="Phone number" />
          </div>
        </div>

        <h2 class="section-title-left">Mailing Address</h2>

        <div class="form-grid">
          <div class="form-field form-field-full">
            <label>Street Address</label>
            <input type="text" id="street" placeholder="Street address" />
          </div>

          <div class="form-field">
            <label>City</label>
            <input type="text" id="city" placeholder="City" />
          </div>

          <div class="form-field">
            <label>State</label>
            <input type="text" id="state" placeholder="State" />
          </div>

          <div class="form-field">
            <label>ZIP Code</label>
            <input type="text" id="zip" placeholder="ZIP code" />
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" id="nextBtn">
            Continue
          </button>
        </div>

      </div>
    </section>
  </main>

  <script>
    document.getElementById("nextBtn").addEventListener("click", function () {
      
      const data = {
        firstName: document.getElementById("firstName").value.trim(),
        lastName: document.getElementById("lastName").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        street: document.getElementById("street").value.trim(),
        city: document.getElementById("city").value.trim(),
        state: document.getElementById("state").value.trim(),
        zip: document.getElementById("zip").value.trim()
      };

      // basic validation
      if (!data.firstName || !data.lastName || !data.email) {
        alert("Please complete all required fields.");
        return;
      }

      // save to localStorage
      localStorage.setItem("cmr_user", JSON.stringify(data));

      // go to next step
      window.location.href = "record-details.html";
      // OR use: results.html if that's your next page
    });
  </script>

</body>
</html>
