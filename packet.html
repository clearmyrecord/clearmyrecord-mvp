<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packet</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #eef2f8;
}

button {
  padding: 16px;
  margin-top: 10px;
  width: 100%;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.primary { background: #17459c; color: white; }
.secondary { background: #e5e9f2; }

#status {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>Generate Sealing Packet</h2>

<input id="sigName" placeholder="Typed Signature" style="width:100%;padding:10px;margin-bottom:10px;"/>

<canvas id="pad" style="width:100%;height:150px;border:1px solid #ccc;"></canvas>

<button class="primary" id="generateBtn">Generate PDF</button>
<button class="secondary" id="testBtn">Test PDF</button>

<div id="status">Ready</div>

<script>
const TEMPLATE_URL = "./assets/wood-county-application-for-sealing-295332-conviction.pdf";

let signatureBytes = null;

/* ---------- STATUS ---------- */
function setStatus(msg, error=false){
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.color = error ? "red" : "#333";
}

/* ---------- SIGNATURE PAD ---------- */
const canvas = document.getElementById("pad");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let drawing = false;

canvas.onmousedown = e => {
  drawing = true;
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
};

canvas.onmousemove = e => {
  if (!drawing) return;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
};

window.onmouseup = () => drawing = false;

/* ---------- HELPERS ---------- */
function dataUrlToBytes(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return bytes;
}

function buildTypedSignature(name){
  const c = document.createElement("canvas");
  c.width = 600;
  c.height = 150;
  const ctx = c.getContext("2d");

  ctx.font = "italic 60px Georgia";
  ctx.fillText(name, 20, 100);

  return dataUrlToBytes(c.toDataURL());
}

/* ---------- FETCH PDF ---------- */
async function fetchPDF(){
  setStatus("Loading PDF...");

  const res = await fetch(TEMPLATE_URL);

  if(!res.ok){
    throw new Error("PDF NOT FOUND → check /assets path");
  }

  return await res.arrayBuffer();
}

/* ---------- TEST ---------- */
document.getElementById("testBtn").onclick = async () => {
  try{
    const bytes = await fetchPDF();
    setStatus("PDF OK (" + bytes.byteLength + " bytes)");
  }catch(e){
    setStatus(e.message, true);
    alert(e.message);
  }
};

/* ---------- GENERATE ---------- */
document.getElementById("generateBtn").onclick = async () => {
  try{
    if(!window.PDFLib) throw new Error("pdf-lib failed");

    const sigName = document.getElementById("sigName").value.trim();

    if(sigName){
      signatureBytes = buildTypedSignature(sigName);
    } else {
      signatureBytes = dataUrlToBytes(canvas.toDataURL());
    }

    const { PDFDocument, StandardFonts } = PDFLib;

    const pdfBytes = await fetchPDF();
    const pdfDoc = await PDFDocument.load(pdfBytes);

    const pages = pdfDoc.getPages();
    const p3 = pages[2];
    const p4 = pages[3];

    const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
    const bold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);

    const sigImg = await pdfDoc.embedPng(signatureBytes);

    function draw(p,t,x,y,size=12,f=font){
      p.drawText(String(t), {x,y,size,font:f});
    }

    function fit(p,t,x,y,max,size=12){
      let s=size;
      while(font.widthOfTextAtSize(t,s)>max && s>8) s-=0.5;
      draw(p,t,x,y,s);
    }

    /* ---------- PAGE 3 ---------- */
    draw(p3,new Date().toLocaleDateString(),148,444);
    fit(p3,"Matt Tunstall",190,407,300);
    fit(p3,"231 W Horizon Ridge Pkwy",95,370,400);
    fit(p3,"428",220,334,100);
    fit(p3,"Henderson, NV",128,297,250);
    fit(p3,"89012",105,260,150);
    fit(p3,"email@email.com",145,224,300);

    /* ---------- PAGE 4 (FIXED) ---------- */
    draw(p4,"2006CR0387",470,676);
    draw(p4,"Robert Pollex",470,649);

    fit(p4,"Matt Tunstall",245,563,170);
    fit(p4,"231 W Horizon Ridge Pkwy",175,535,240);
    fit(p4,"Henderson NV 89012",205,508,210);
    fit(p4,"8555219810",175,480,240);
    fit(p4,"email@email.com",165,452,250);

    fit(p4,"Matt Tunstall",145,420,170);
    draw(p4,"05/04/2007",95,389,12,bold);

    fit(p4,"Possession of Drugs",70,326,220);
    fit(p4,"2925.11(A)",355,326,120);
    fit(p4,"F3",505,326,120);

    draw(p4,"05/07/2010",340,214,12,bold);

    const dims = sigImg.scale(0.32);
    p4.drawImage(sigImg,{
      x:420,
      y:73,
      width:dims.width,
      height:dims.height
    });

    fit(p4,"Matt Tunstall",95,44,200);

    /* ---------- SAVE ---------- */
    const final = await pdfDoc.save();

    const blob = new Blob([final],{type:"application/pdf"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "sealing.pdf";
    a.click();

    setStatus("Done ✅");

  }catch(e){
    console.error(e);
    setStatus(e.message,true);
    alert(e.message);
  }
};
</script>

</body>
</html>
