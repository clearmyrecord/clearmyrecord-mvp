<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Filing Packet | RecordPathAI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #eef2f8;
      --surface: #ffffff;
      --surface-soft: #f6f9ff;
      --text: #233d70;
      --muted: #667796;
      --line: #dbe3f0;
      --shadow: 0 10px 30px rgba(50, 78, 128, 0.08);
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .packet-shell {
      width: min(980px, 92%);
      margin: 24px auto 64px;
    }

    .packet-stack {
      display: grid;
      gap: 22px;
    }

    .packet-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 30px;
    }

    .packet-title {
      margin: 0 0 12px;
      font-size: clamp(40px, 5vw, 64px);
      line-height: 1.02;
      color: #26457a;
    }

    .packet-subtitle {
      margin: 0;
      color: #60708d;
      font-size: 18px;
      line-height: 1.6;
    }

    .section-title {
      margin: 0 0 18px;
      color: #26457a;
      font-size: clamp(28px, 3vw, 44px);
      line-height: 1.08;
    }

    .callout {
      background: #eef4ff;
      border: 1px solid #d8e3f4;
      border-left: 8px solid #1f4ca5;
      border-radius: 22px;
      padding: 24px;
      color: #23344f;
      font-size: 17px;
      line-height: 1.7;
      margin: 10px 0 22px;
    }

    .button-stack {
      display: grid;
      gap: 16px;
    }

    .packet-btn {
      min-height: 76px;
      padding: 18px 26px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 20px;
      font-weight: 800;
    }

    .packet-btn-primary {
      background: #17459c;
      color: #fff;
    }

    .packet-btn-secondary {
      background: #e8edf6;
      color: #22314d;
    }

    .sig-input {
      width: 100%;
      min-height: 54px;
      padding: 14px 16px;
      border: 1px solid #d5e0ef;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }

    #signaturePad {
      width: 100%;
      height: 180px;
      border: 1px solid #cfd9ea;
      border-radius: 12px;
      background: #fff;
      touch-action: none;
      display: block;
    }

    .sig-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .sig-small-btn {
      min-height: 48px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #d5e0ef;
      background: #fff;
      color: #3c557d;
      font-weight: 700;
      cursor: pointer;
    }

    .meta-note {
      margin-top: 18px;
      color: #6a7894;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .packet-card {
        padding: 24px 18px;
      }

      .packet-title {
        font-size: 34px;
      }

      .packet-btn {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="packet-shell">
      <div class="packet-stack">
        <section class="packet-card">
          <h1 class="packet-title">Your Filing Packet</h1>
          <p class="packet-subtitle">
            RecordPathAI will use the selected court packet when available.
          </p>
        </section>

        <section class="packet-card">
          <h2 class="section-title">Selected Packet</h2>
          <div class="callout" id="packetStatus">Packet information will appear here.</div>

          <input id="typedSignature" class="sig-input" type="text" placeholder="Typed signature name" />
          <canvas id="signaturePad"></canvas>

          <div class="sig-actions">
            <button type="button" class="sig-small-btn" id="useTypedSigBtn">Use Typed Signature</button>
            <button type="button" class="sig-small-btn" id="useDrawnSigBtn">Use Drawn Signature</button>
            <button type="button" class="sig-small-btn" id="clearSigBtn">Clear Signature</button>
          </div>

          <div class="button-stack" style="margin-top: 22px;">
            <button type="button" class="packet-btn packet-btn-primary" id="generateSealingBtn">
              Generate Sealing PDF
            </button>

            <button type="button" class="packet-btn packet-btn-secondary" id="openPacketSourceBtn">
              Open Official Packet Source
            </button>
          </div>

          <p class="meta-note">
            Wood County is mapped for direct PDF filling. Other courts open the official packet source until their template is mapped.
          </p>
        </section>
      </div>
    </section>
  </main>

  <script>
    const WOOD_COUNTY_TEMPLATE_PATH = "assets/wood-county-application-for-sealing-295332-conviction.pdf";

    const WOOD_COUNTY_DEFAULTS = {
      caseNumber: "2006CR0387",
      judge: "Robert Pollex",
      convictionDate: "2007-05-04",
      finalDischargeDate: "2010-05-07",
      offenseCode: "2925.11(A)",
      offenseName: "Possession of Drugs",
      offenseDegree: "Felony 3rd Degree",
      apartment: "428",
      phone: "855-412-9810"
    };

    let signatureImageBytes = null;

    function readStoredData() {
      try {
        return JSON.parse(sessionStorage.getItem("recordPath_recordDetails") || "[]");
      } catch {
        return [];
      }
    }

    function safe(value, fallback = "") {
      return (value ?? "").toString().trim() || fallback;
    }

    function getFirstOffense() {
      const rows = readStoredData();
      return Array.isArray(rows) && rows.length ? rows[0] : {};
    }

    function getPacketData() {
      const offense = getFirstOffense();
      return {
        fullName: "Applicant",
        packetUrl: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("packet_url_")), ""),
        packetTitle: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("packet_title_")), ""),
        source: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("court_source_")), ""),
        mappingKey: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("packet_mapping_key_")), ""),
        caseNumber: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("case_number_")), WOOD_COUNTY_DEFAULTS.caseNumber),
        chargeName: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("charge_name_")), WOOD_COUNTY_DEFAULTS.offenseName),
        chargeLevel: safe(Object.values(offense).find((_, i, arr) => Object.keys(offense)[i]?.startsWith("charge_level_")), WOOD_COUNTY_DEFAULTS.offenseDegree)
      };
    }

    function updatePacketStatus() {
      const data = getPacketData();
      const el = document.getElementById("packetStatus");
      if (!data.packetUrl) {
        el.textContent = "No packet found yet. Go back and search with a more complete court name.";
        return;
      }
      el.innerHTML = `
        Packet: <strong>${data.packetTitle || "Official packet"}</strong><br>
        Source: <strong>${data.source || "Official source"}</strong>
      `;
    }

    function setupSignaturePad() {
      const canvas = document.getElementById("signaturePad");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#111";
      }

      let drawing = false;

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const touch = event.touches && event.touches[0];
        const clientX = touch ? touch.clientX : event.clientX;
        const clientY = touch ? touch.clientY : event.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function start(event) {
        drawing = true;
        const p = pointFromEvent(event);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        event.preventDefault();
      }

      function move(event) {
        if (!drawing) return;
        const p = pointFromEvent(event);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        event.preventDefault();
      }

      function end() {
        drawing = false;
      }

      function clearPad() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      window.clearSignaturePadCanvas = clearPad;
      window.getSignaturePadDataUrl = () => canvas.toDataURL("image/png");

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      canvas.addEventListener("mousedown", start);
      canvas.addEventListener("mousemove", move);
      window.addEventListener("mouseup", end);

      canvas.addEventListener("touchstart", start, { passive: false });
      canvas.addEventListener("touchmove", move, { passive: false });
      window.addEventListener("touchend", end);
    }

    function dataUrlToBytes(dataUrl) {
      const base64 = dataUrl.split(",")[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function buildTypedSignatureImage(name) {
      const canvas = document.createElement("canvas");
      canvas.width = 700;
      canvas.height = 180;
      const ctx = canvas.getContext("2d");
      ctx.font = "italic 64px Georgia";
      ctx.fillStyle = "#111";
      ctx.fillText(name, 18, 110);
      return dataUrlToBytes(canvas.toDataURL("image/png"));
    }

    function setTypedSignature() {
      const value = document.getElementById("typedSignature").value.trim() || "Applicant";
      signatureImageBytes = buildTypedSignatureImage(value);
    }

    function setDrawnSignature() {
      signatureImageBytes = dataUrlToBytes(window.getSignaturePadDataUrl());
    }

    function clearSignature() {
      signatureImageBytes = null;
      window.clearSignaturePadCanvas();
    }

    async function generateWoodCountyPdf() {
      const data = getPacketData();
      if (!signatureImageBytes) setTypedSignature();

      const { PDFDocument, StandardFonts, rgb } = PDFLib;
      const response = await fetch(WOOD_COUNTY_TEMPLATE_PATH);
      if (!response.ok) throw new Error("Wood County template not found in assets folder.");

      const templateBytes = await response.arrayBuffer();
      const pdfDoc = await PDFDocument.load(templateBytes);
      const pages = pdfDoc.getPages();
      const addressPage = pages[2];
      const applicationPage = pages[3];

      const helvetica = await pdfDoc.embedFont(StandardFonts.Helvetica);
      const helveticaBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
      const sigImage = await pdfDoc.embedPng(signatureImageBytes);
      const black = rgb(0, 0, 0);

      function draw(page, text, x, y, size = 12, font = helvetica) {
        page.drawText(String(text || ""), { x, y, size, font, color: black });
      }

      draw(addressPage, "Applicant", 190, 407, 12, helvetica);
      draw(applicationPage, data.caseNumber, 470, 678, 12, helvetica);
      draw(applicationPage, WOOD_COUNTY_DEFAULTS.judge, 470, 651, 12, helvetica);
      draw(applicationPage, data.chargeName, 52, 346, 12, helvetica);
      draw(applicationPage, WOOD_COUNTY_DEFAULTS.offenseCode, 265, 346, 12, helvetica);
      draw(applicationPage, data.chargeLevel, 425, 346, 12, helveticaBold);

      const sigDims = sigImage.scale(0.32);
      applicationPage.drawImage(sigImage, {
        x: 382,
        y: 76,
        width: sigDims.width,
        height: sigDims.height
      });

      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "court-packet.pdf";
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    async function generateSealingPdf() {
      const data = getPacketData();

      if (!data.packetUrl) {
        alert("No official packet found yet.");
        return;
      }

      if (data.mappingKey === "wood-county-common-pleas-conviction-sealing") {
        await generateWoodCountyPdf();
        return;
      }

      window.open(data.packetUrl, "_blank");
      alert("Official packet found. This court is not mapped for auto-fill yet.");
    }

    function openOfficialPacketSource() {
      const data = getPacketData();
      if (!data.packetUrl) {
        alert("No official packet found yet.");
        return;
      }
      window.open(data.packetUrl, "_blank");
    }

    document.getElementById("useTypedSigBtn").addEventListener("click", setTypedSignature);
    document.getElementById("useDrawnSigBtn").addEventListener("click", setDrawnSignature);
    document.getElementById("clearSigBtn").addEventListener("click", clearSignature);
    document.getElementById("generateSealingBtn").addEventListener("click", generateSealingPdf);
    document.getElementById("openPacketSourceBtn").addEventListener("click", openOfficialPacketSource);

    setupSignaturePad();
    updatePacketStatus();
    setTypedSignature();
  </script>
</body>
</html>
