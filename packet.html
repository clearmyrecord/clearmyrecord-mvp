<script>
  const TEMPLATE_URL = "./assets/wood-county-application-for-sealing-295332-conviction.pdf";

  const DEFAULTS = {
    woodCountyCaseNumber: "2006CR0387",
    woodCountyJudge: "Robert Pollex",
    woodCountyConvictionDate: "2007-05-04",
    woodCountyFinalDischargeDate: "2010-05-07",
    woodCountyOffenseCode: "2925.11(A)",
    woodCountyOffenseName: "Possession of Drugs",
    woodCountyOffenseDegree: "Felony 3rd Degree",
    apartment: "428",
    phone: "855-412-9810"
  };

  let signatureImageBytes = null;

  function setStatus(message) {
    const el = document.getElementById("statusText");
    if (el) el.textContent = message;
  }

  function readStoredData() {
    try {
      return {
        user: JSON.parse(localStorage.getItem("cmr_user") || "{}"),
        recordDetails: JSON.parse(sessionStorage.getItem("recordPath_recordDetails") || "[]")
      };
    } catch (error) {
      return { user: {}, recordDetails: [] };
    }
  }

  function safe(value, fallback = "") {
    return (value ?? "").toString().trim() || fallback;
  }

  function isoDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function formatDateForCourt(dateString) {
    if (!dateString) return "";
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return dateString;
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    const year = date.getFullYear();
    return `${month}/${day}/${year}`;
  }

  function addYears(dateString, years) {
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return "";
    date.setFullYear(date.getFullYear() + years);
    return isoDate(date);
  }

  function getFirstOffense(recordDetails) {
    if (!Array.isArray(recordDetails) || !recordDetails.length) return {};
    const row = recordDetails[0] || {};

    const byPrefix = (prefix) => {
      const key = Object.keys(row).find((k) => k.startsWith(prefix));
      return key ? row[key] : "";
    };

    return {
      chargeName: byPrefix("charge_name_"),
      chargeLevel: byPrefix("charge_level_"),
      caseNumber: byPrefix("case_number_"),
      arrestDate: byPrefix("arrest_date_"),
      disposition: byPrefix("disposition_"),
      stateFromRecord: byPrefix("state_"),
      court: byPrefix("court_"),
      county: byPrefix("county_")
    };
  }

  function getPacketData() {
    const { user, recordDetails } = readStoredData();
    const offense = getFirstOffense(recordDetails);

    const fullName = `${safe(user.firstName)} ${safe(user.lastName)}`.trim() || "Matthew Tunstall";

    return {
      fullName,
      street: safe(user.street, "231 W Horizon Ridge Parkway"),
      apartment: DEFAULTS.apartment,
      city: safe(user.city, "Henderson"),
      state: safe(offense.stateFromRecord || user.state, "Ohio"),
      zip: safe(user.zip, "89012"),
      email: safe(user.email, "Matt@unitedpaintersnv.com"),
      phone: safe(user.phone, DEFAULTS.phone),
      caseNumber: safe(offense.caseNumber, DEFAULTS.woodCountyCaseNumber),
      chargeName: safe(offense.chargeName, DEFAULTS.woodCountyOffenseName),
      chargeLevel: safe(offense.chargeLevel, DEFAULTS.woodCountyOffenseDegree),
      arrestDate: safe(offense.arrestDate, DEFAULTS.woodCountyFinalDischargeDate),
      disposition: safe(offense.disposition, ""),
      court: safe(offense.court, ""),
      county: safe(offense.county, "")
    };
  }

  // State rules engine
  // This is product logic, not legal advice. It gives a smarter state-aware UX layer.
  const STATE_RULES = {
    Ohio: {
      label: "Record Sealing",
      basis: "final_discharge",
      defaultWaitYears: 3,
      getWaitYears(data) {
        const level = (data.chargeLevel || "").toLowerCase();

        if (level.includes("felony 3") || level.includes("3rd degree")) return 3;
        if (level.includes("felony")) return 1;
        if (level.includes("misdemeanor")) return 1;

        return 3;
      },
      summary(data, eligibleDate, isEligible) {
        if (isEligible) {
          return `Ohio timing check passed. Based on the entered offense level and final discharge timeline, the record appears eligible for sealing as of ${eligibleDate}.`;
        }
        return `Ohio timing check is not met yet. Based on the entered offense level and final discharge timeline, the earliest seal date appears to be ${eligibleDate}.`;
      }
    },

    California: {
      label: "Clean Your Record",
      basis: "conviction_or_case_outcome",
      defaultWaitYears: 0,
      getWaitYears() {
        return 0;
      },
      summary(data) {
        return "California uses different clean-record paths and can require statewide forms and sometimes local court forms. This result should be treated as a screening flag, not a final eligibility determination.";
      }
    },

    Texas: {
      label: "Nondisclosure / Sealing",
      basis: "varies_by_statute",
      defaultWaitYears: 0,
      getWaitYears() {
        return 0;
      },
      summary() {
        return "Texas uses multiple nondisclosure paths instead of one single statewide sealing rule. This result should be treated as a screening flag, not a final eligibility determination.";
      }
    }
  };

  function getStateRule(stateName) {
    return STATE_RULES[stateName] || {
      label: "Record Clearing",
      basis: "manual_review",
      defaultWaitYears: 0,
      getWaitYears() {
        return 0;
      },
      summary() {
        return "This state is not fully mapped yet. RecordPathAI can still collect case data and packet information, but eligibility should be reviewed manually.";
      }
    };
  }

  function setEligibilityUI(type, title, summary) {
    const pill = document.getElementById("statusPill");
    const headline = document.getElementById("eligibilityHeadline");
    const body = document.getElementById("eligibilitySummary");

    if (!pill || !headline || !body) return;

    pill.className = "status-pill " + type;
    pill.textContent = title;
    headline.textContent = title;
    body.textContent = summary;
  }

  function updateEligibilitySection() {
    const data = getPacketData();
    const rule = getStateRule(data.state);
    const today = new Date();
    const todayString = isoDate(today);

    const finalDischargeEl = document.getElementById("finalDischargeDate");
    const sealingDateEl = document.getElementById("sealingDate");
    const todayDateEl = document.getElementById("todayDate");

    if (todayDateEl) todayDateEl.textContent = todayString;

    // Default date source:
    // Ohio -> use final discharge style timeline
    // Other states -> use arrest/conviction date as rough placeholder for screening only
    const baseDate =
      data.state === "Ohio"
        ? DEFAULTS.woodCountyFinalDischargeDate
        : data.arrestDate;

    const baseDateObj = new Date(baseDate);

    if (finalDischargeEl) finalDischargeEl.textContent = baseDate || "—";

    if (Number.isNaN(baseDateObj.getTime())) {
      if (sealingDateEl) sealingDateEl.textContent = "—";
      setEligibilityUI(
        "pending",
        "Eligibility Needs Review",
        `We need a valid case date to estimate eligibility for ${data.state || "this state"}.`
      );
      return;
    }

    const waitYears = rule.getWaitYears(data);
    const eligibleDate = waitYears > 0 ? addYears(baseDate, waitYears) : "Manual Review";
    const eligibleDateObj = eligibleDate !== "Manual Review" ? new Date(eligibleDate) : null;

    if (sealingDateEl) sealingDateEl.textContent = eligibleDate;

    if (data.state === "Ohio") {
      if (eligibleDateObj && !Number.isNaN(eligibleDateObj.getTime())) {
        const isEligible = today >= eligibleDateObj;

        setEligibilityUI(
          isEligible ? "eligible" : "pending",
          isEligible ? "Eligible to Seal" : "Not Yet Eligible to Seal",
          rule.summary(data, eligibleDate, isEligible)
        );
        return;
      }
    }

    if (data.state === "California") {
      setEligibilityUI(
        "pending",
        "California Eligibility Needs Review",
        rule.summary(data)
      );
      return;
    }

    if (data.state === "Texas") {
      setEligibilityUI(
        "pending",
        "Texas Eligibility Needs Review",
        rule.summary(data)
      );
      return;
    }

    setEligibilityUI(
      "pending",
      `${data.state || "State"} Eligibility Needs Review`,
      rule.summary(data)
    );
  }

  function setupSignaturePad() {
    const canvas = document.getElementById("signaturePad");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#111";
    }

    let drawing = false;

    function pointFromEvent(event) {
      const rect = canvas.getBoundingClientRect();
      const touch = event.touches && event.touches[0];
      const clientX = touch ? touch.clientX : event.clientX;
      const clientY = touch ? touch.clientY : event.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(event) {
      drawing = true;
      const p = pointFromEvent(event);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      event.preventDefault();
    }

    function move(event) {
      if (!drawing) return;
      const p = pointFromEvent(event);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      event.preventDefault();
    }

    function end() {
      drawing = false;
    }

    function clearPad() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.clearSignaturePadCanvas = clearPad;
    window.getSignaturePadDataUrl = () => canvas.toDataURL("image/png");

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);
    canvas.addEventListener("mousedown", start);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", end);
    canvas.addEventListener("touchstart", start, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("touchend", end);
  }

  function dataUrlToBytes(dataUrl) {
    const base64 = dataUrl.split(",")[1];
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes;
  }

  function buildTypedSignatureImage(name) {
    const canvas = document.createElement("canvas");
    canvas.width = 700;
    canvas.height = 180;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = "italic 64px Georgia";
    ctx.fillStyle = "#111";
    ctx.fillText(name, 18, 110);
    return dataUrlToBytes(canvas.toDataURL("image/png"));
  }

  function setTypedSignature() {
    const value = document.getElementById("typedSignature").value.trim();
    if (!value) {
      alert("Enter a name for the typed signature.");
      return;
    }
    signatureImageBytes = buildTypedSignatureImage(value);
    setStatus("Typed signature selected.");
  }

  function setDrawnSignature() {
    const dataUrl = window.getSignaturePadDataUrl();
    signatureImageBytes = dataUrlToBytes(dataUrl);
    setStatus("Drawn signature selected.");
  }

  function clearSignature() {
    signatureImageBytes = null;
    window.clearSignaturePadCanvas();
    setStatus("Signature cleared.");
  }

  async function fetchTemplateBytes() {
    const response = await fetch(TEMPLATE_URL);
    if (!response.ok) {
      throw new Error("PDF not found. Make sure the file is in /assets and the filename matches exactly.");
    }
    return await response.arrayBuffer();
  }

  async function generateSealingPdf() {
    try {
      setStatus("Loading PDF template...");

      if (!signatureImageBytes) {
        setTypedSignature();
      }

      const data = getPacketData();
      const { PDFDocument, StandardFonts, rgb } = PDFLib;
      const templateBytes = await fetchTemplateBytes();
      const pdfDoc = await PDFDocument.load(templateBytes);
      const pages = pdfDoc.getPages();

      if (pages.length < 4) {
        throw new Error("Unexpected PDF. This template does not look like the Wood County packet.");
      }

      const addressPage = pages[2];
      const applicationPage = pages[3];

      const helvetica = await pdfDoc.embedFont(StandardFonts.Helvetica);
      const helveticaBold = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
      const sigImage = await pdfDoc.embedPng(signatureImageBytes);
      const black = rgb(0, 0, 0);

      function draw(page, text, x, y, size = 12, font = helvetica) {
        page.drawText(String(text || ""), { x, y, size, font, color: black });
      }

      function drawFit(page, text, x, y, maxWidth, size = 12, font = helvetica) {
        let currentSize = size;
        const content = String(text || "");
        let width = font.widthOfTextAtSize(content, currentSize);
        while (width > maxWidth && currentSize > 8) {
          currentSize -= 0.5;
          width = font.widthOfTextAtSize(content, currentSize);
        }
        page.drawText(content, { x, y, size: currentSize, font, color: black });
      }

      setStatus("Filling PDF...");

      draw(addressPage, new Date().toLocaleDateString("en-US", {
        month: "long",
        day: "numeric",
        year: "numeric"
      }), 148, 444, 12, helvetica);

      drawFit(addressPage, data.fullName, 190, 407, 325, 12, helvetica);
      drawFit(addressPage, data.street, 95, 370, 420, 12, helvetica);
      drawFit(addressPage, data.apartment, 220, 334, 120, 12, helvetica);
      drawFit(addressPage, `${data.city}, ${data.state}`, 128, 297, 250, 12, helvetica);
      drawFit(addressPage, data.zip, 105, 260, 150, 12, helvetica);
      drawFit(addressPage, data.email, 145, 224, 325, 12, helvetica);

      drawFit(applicationPage, data.caseNumber, 470, 678, 120, 12, helvetica);
      drawFit(applicationPage, DEFAULTS.woodCountyJudge, 470, 651, 120, 12, helvetica);

      drawFit(applicationPage, data.fullName, 175, 563, 240, 12, helvetica);
      drawFit(applicationPage, `${data.street} #${data.apartment}`, 178, 536, 245, 12, helvetica);
      drawFit(applicationPage, `${data.city}, ${data.state} ${data.zip}`, 205, 510, 220, 12, helvetica);
      drawFit(applicationPage, data.phone, 185, 484, 240, 12, helvetica);
      drawFit(applicationPage, data.email, 165, 458, 260, 12, helvetica);

      drawFit(applicationPage, data.fullName, 145, 421, 185, 12, helvetica);
      draw(applicationPage, formatDateForCourt(DEFAULTS.woodCountyConvictionDate), 72, 386, 12, helveticaBold);

      drawFit(applicationPage, data.chargeName, 52, 346, 185, 12, helvetica);
      drawFit(applicationPage, DEFAULTS.woodCountyOffenseCode, 265, 346, 110, 12, helvetica);
      drawFit(applicationPage, data.chargeLevel, 425, 346, 130, 12, helvetica);

      draw(applicationPage, formatDateForCourt(DEFAULTS.woodCountyFinalDischargeDate), 262, 241, 12, helveticaBold);

      const sigDims = sigImage.scale(0.32);
      applicationPage.drawImage(sigImage, {
        x: 382,
        y: 76,
        width: sigDims.width,
        height: sigDims.height
      });

      drawFit(applicationPage, data.fullName, 88, 44, 210, 12, helvetica);

      setStatus("Saving PDF...");

      const pdfBytes = await pdfDoc.save();
      const blob = new Blob([pdfBytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "wood-county-sealing-packet-recordpathai.pdf";
      document.body.appendChild(link);
      link.click();
      link.remove();

      setTimeout(() => URL.revokeObjectURL(url), 5000);
      setStatus("Done. Your PDF should be downloading.");
    } catch (error) {
      console.error(error);
      setStatus("Error: " + error.message);
      alert(error.message);
    }
  }

  document.getElementById("useTypedSigBtn").addEventListener("click", setTypedSignature);
  document.getElementById("useDrawnSigBtn").addEventListener("click", setDrawnSignature);
  document.getElementById("clearSigBtn").addEventListener("click", clearSignature);
  document.getElementById("clearPadBtn").addEventListener("click", clearSignature);
  document.getElementById("generateSealingBtn").addEventListener("click", generateSealingPdf);
  document.getElementById("openSourceBtn").addEventListener("click", function () {
    window.open(TEMPLATE_URL, "_blank");
  });

  setupSignaturePad();
  updateEligibilitySection();
  document.getElementById("typedSignature").value = getPacketData().fullName;
  setTypedSignature();
</script>
